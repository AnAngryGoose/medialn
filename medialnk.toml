# medialnk configuration
# https://github.com/AnAngryGoose/medialnk

[paths]
# Base path where your media directories live on the host.
media_root_host = "/mnt/storage/data/media"

# Same path inside Docker containers (Jellyfin, Sonarr, etc).
# If not using Docker, set to same value as media_root_host.
media_root_container = "/data/media"

# Source directories (never modified). Relative to media_root_host or absolute.
movies_source = "movies"
tv_source = "tv"

# Output directories (symlinks created here). Point Jellyfin/Plex at these. Relative to media_root_host or absolute.
movies_linked = "movies-linked"
tv_linked = "tv-linked"

[tmdb]
# Free key from https://www.themoviedb.org/settings/api
# Also settable via TMDB_API_KEY env var.
api_key = ""

# Reject TMDB results that don't closely match the parsed name.
confidence_check = true

[logging]
# Per-run log directory. Relative to media_root_host or absolute.
log_dir = "/opt/medialnk/medialnk/logs"

# Console verbosity: quiet, normal, verbose, debug
# Override with -q, -v, -vv flags.
verbosity = "-v"

# --- Overrides ---
# Run `medialnk sync --dry-run -v` to see parsed names.

[overrides.tv_names]
# "parsed name" = "corrected name"
# "The Office US" = "The Office (US)"

[overrides.tv_orphans]
# Bare "Season N" folders with no show name.
# "folder name" = { show = "Show Name", season = 1 }

[overrides.movie_titles]
# "parsed title" = { title = "Correct Title", year = 2024 }

[health]
# Pre-sync validation of source directories.
enabled = true
# Abort if a source directory has fewer video files than this (catches unmounted drives).
min_source_files = 10
# Optional file that must exist before sync proceeds (e.g. a sentinel on a mergerfs pool).
sentinel_file = ""
# HTTP health endpoint port for monitoring. 0 = disabled. Set for Docker HEALTHCHECK.
port = 0

[sync]
# Automatically remove broken symlinks after each sync.
clean_after_sync = false

[watch]
# Must be true for `medialnk watch` to start. Prevents accidental daemon starts.
enabled = false
# Wait this long after detecting new content before processing (seconds).
debounce_seconds = 30
# How often to scan source directories for changes (seconds).
poll_interval_seconds = 60
